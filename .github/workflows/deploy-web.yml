name: Deploy Web to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "deploy/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: "Container image tag (defaults to short SHA)"
        required: false

env:
  IMAGE_NAME: tf-avm-agent-web

jobs:
  # ── Provision infrastructure (ACR, Container Apps Environment, etc.) ────────
  infra:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      acr_login_server: ${{ steps.tf-output.outputs.acr_login_server }}

    defaults:
      run:
        working-directory: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Terraform apply infrastructure
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="environment=${{ inputs.environment || 'dev' }}" \
            -var="backend_url=${{ vars.BACKEND_URL }}" \
            -target=module.resource-group \
            -target=module.container-registry \
            -target=module.log-analytics-workspace \
            -target=module.container-apps-environment

      - name: Get ACR login server
        id: tf-output
        run: |
          echo "acr_login_server=$(terraform output -raw container_registry_login_server)" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker image ──────────────────────────────────────────────
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: infra
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          echo "image_tag=${TAG::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          REGISTRY="${{ needs.infra.outputs.acr_login_server }}"
          az acr login --name "${REGISTRY%%.*}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ needs.infra.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ needs.infra.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Terraform full apply (deploys Container App with the pushed image) ─────
  deploy:
    name: Terraform deploy
    runs-on: ubuntu-latest
    needs: [infra, build]
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="environment=${{ inputs.environment || 'dev' }}" \
            -var="image_tag=${{ needs.build.outputs.image_tag }}" \
            -var="backend_url=${{ vars.BACKEND_URL }}" \
            -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
